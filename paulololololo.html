<!DOCTYPE html>
<html>
<head>
  <title>Login - VZEN's Electronic Shop</title>
  <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/5604/5604299.png">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #e6ffe6, #e6f2ff);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .login-box {
      background: white;
      width: 300px;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 2px 2px 10px gray;
      text-align: center;
    }

    h2 {
      color: #007f5f;
    }

    input {
      width: 90%;
      padding: 8px;
      margin: 8px 0;
    }

    button {
      background-color: #007f5f;
      color: white;
      padding: 8px 15px;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background-color: #004aad;
    }
  </style>
</head>

<body>

<div class="login-box">
  <h2>Login</h2>

  <form action="paulo.html">
    <input type="text" name="username" placeholder="Enter Username" required><br>
    <input type="password" name="password" placeholder="Enter Password" required><br>
    <button type="submit">Login</button>
  </form>

</div>

</body>
</html>
